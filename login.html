<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyOrder | Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#06070a; --panel:#111318; --border:#262b36; --text:#f4f7fb;
      --muted:#98a2b3; --accent:#ea1d2c;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100dvh; display:grid; place-items:center; padding:24px;
      background:radial-gradient(circle at top left, rgba(234,29,44,.18), transparent 28%), var(--bg);
      color:var(--text); font-family:Inter, sans-serif;
    }
    .card{
      width:min(100%,420px); background:linear-gradient(180deg,var(--panel),#171a20);
      border:1px solid var(--border); border-radius:28px; padding:28px; box-shadow:0 24px 60px rgba(0,0,0,.35);
    }
    .logo{
      width:52px; height:52px; border-radius:16px; display:grid; place-items:center;
      background:linear-gradient(135deg,var(--accent),#ff5965); font-weight:900; margin-bottom:18px;
    }
    h1{margin:0 0 8px; font-size:2rem; letter-spacing:-.05em}
    p{margin:0 0 22px; color:var(--muted); line-height:1.45}
    input{
      width:100%; min-height:52px; border-radius:16px; border:1px solid var(--border);
      background:#0f1319; color:var(--text); padding:0 14px; margin-bottom:12px; outline:none;
    }
    input:focus{border-color:rgba(234,29,44,.55); box-shadow:0 0 0 4px rgba(234,29,44,.12)}
    button{
      width:100%; min-height:52px; border:0; border-radius:16px; cursor:pointer;
      background:linear-gradient(135deg,var(--accent),#ff5662); color:white; font-weight:900;
    }
    .msg{margin-top:14px; color:var(--muted); font-size:.9rem; min-height:20px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">EO</div>
    <h1>EasyOrder</h1>
    <p>Entre no painel do lojista para gerenciar pedidos, cardápio, entregadores e WhatsApp.</p>

    <input id="email" type="email" placeholder="Email" autocomplete="email">
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password">
    <button id="btn" onclick="login()">Entrar no manager</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tyokrmmtluixdosmmygf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');

      if (!email || !password) {
        msg.textContent = 'Preencha email e senha.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      msg.textContent = '';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = 'Erro: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Entrar no manager';
        return;
      }

      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
