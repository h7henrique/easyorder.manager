<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyOrder Pro - Gestão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-body: #F3F4F6; --bg-sidebar: #FFFFFF; --bg-card: #FFFFFF;
            --text-main: #111827; --text-sec: #6B7280; --border: #E5E7EB;
            --primary: #EA1D2C; --primary-dark: #b91c1c; --white: #FFFFFF;
            --green: #10B981; --yellow: #F59E0B; --blue: #3B82F6;
            --kds-bg: #1E1E1E; --kds-yellow: #F2C94C; --kds-green: #25D366; --kds-red: #EA1D2C; --kds-blue: #3B82F6;
        }
        body.dark-mode {
            --bg-body: #0F172A; --bg-sidebar: #1E293B; --bg-card: #1E293B;
            --text-main: #F8FAFC; --text-sec: #94A3B8; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s; }
        
        aside { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; z-index: 20; }
        .brand { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .brand i { color: var(--primary); }
        nav a { text-decoration: none; color: var(--text-sec); padding: 12px 16px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; position: relative; }
        nav a:hover, nav a.active { background: rgba(234, 29, 44, 0.05); color: var(--primary); }
        nav a.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(234, 29, 44, 0.3); }
        
        @media (max-width: 768px) {
            aside { position: fixed; left: -260px; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; }
            aside.open { left: 0; }
            main { padding: 15px; padding-top: 60px; }
            .menu-toggle { display: flex !important; align-items: center; justify-content: center; position: fixed; top: 15px; left: 15px; z-index: 100; background: var(--bg-card); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; color: var(--text-main); font-size: 1.2rem; }
        }
        .menu-toggle { display: none; }

        main { flex: 1; padding: 32px; overflow-y: auto; }
        header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.8rem; font-weight: 700; }
        section { display: none; animation: fadeUp 0.3s ease-out; }
        section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--border); background: transparent; color: var(--text-sec); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }
        
        /* KDS */
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .kds-card { background: #262626; color: white; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; }
        .kds-card.pendente { border-left: 6px solid var(--kds-red); }
        .kds-card.preparando { border-left: 6px solid var(--kds-yellow); }
        .kds-card.aguardando_entregador { border-left: 6px solid var(--kds-blue); opacity: 0.8; }
        .btn-kds { padding: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action { background: var(--kds-yellow); color: #121212; }
        .btn-dispatch { background: var(--kds-blue); color: white; }

        /* MOTO & MENU GRID */
        .moto-grid, .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .moto-card, .menu-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
        .menu-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #eee; }
        .btn-delete { background: rgba(255,0,0,0.1); color: red; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; position: absolute; top: 15px; right: 15px; }
        
        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 50; display: none; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-overlay.open { display: flex; }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; animation: popUp 0.3s; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; color: var(--text-sec); }
        .form-group input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); }
        @keyframes popUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="document.querySelector('aside').classList.toggle('open')"><i class="fa-solid fa-bars"></i></div>

    <aside>
        <div class="brand"><i class="fa-solid fa-burger"></i> EasyOrder</div>
        <nav>
            <a onclick="app.nav('dashboard')" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a onclick="app.nav('pedidos')"><i class="fa-solid fa-fire-burner"></i> Cozinha (KDS)</a>
            <a onclick="app.nav('cardapio')"><i class="fa-solid fa-utensils"></i> Cardápio</a>
            <a onclick="app.nav('entregadores')"><i class="fa-solid fa-motorcycle"></i> Entregadores</a>
            <a onclick="app.nav('bot')"><i class="fa-brands fa-whatsapp"></i> Robô Zap</a>
        </nav>
        <div style="margin-top:auto"><button class="btn btn-outline" style="width:100%" onclick="app.toggleTheme()">Tema Escuro</button></div>
    </aside>

    <main>
        <section id="dashboard" class="active">
            <header><h1>Visão Geral</h1><button class="btn btn-primary" onclick="app.nav('pedidos')">Ver Cozinha</button></header>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px">
                <div class="card" style="border-left:4px solid var(--primary)"><span>Vendas Hoje</span><br><b id="dash-vendas" style="font-size:2rem">R$ 0,00</b></div>
                <div class="card"><span>Pedidos</span><br><b id="dash-pedidos" style="font-size:2rem">0</b></div>
            </div>
            <div class="card" style="height:300px"><canvas id="salesChart"></canvas></div>
        </section>

        <section id="pedidos">
            <header>
                <h1>KDS Cozinha</h1>
                <div style="display:flex; gap:10px; align-items:center">
                    <button onclick="kds.buscar()" class="btn btn-outline"><i class="fa-solid fa-rotate"></i></button>
                    <div id="clock" style="font-family:'JetBrains Mono'; font-weight:bold">00:00</div>
                </div>
            </header>
            <div id="kds-grid" class="kds-grid"></div>
        </section>

        <section id="cardapio">
            <header><h1>Gerenciar Cardápio</h1><button class="btn btn-primary" onclick="menu.modal()">+ Novo Produto</button></header>
            <div id="menu-grid" class="menu-grid"></div>
        </section>

        <section id="entregadores">
            <header><h1>Entregadores</h1><button class="btn btn-primary" onclick="entregadores.modal()">+ Cadastrar</button></header>
            <div id="map-view" style="height:300px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border)"></div>
            <div id="moto-grid" class="moto-grid"></div>
        </section>

        <section id="bot">
            <header><h1>Conexão WhatsApp</h1></header>
            <div class="card" style="text-align:center">
                <img id="wpp-qr" src="https://via.placeholder.com/300?text=Aguardando+QR" style="width:250px">
                <div id="wpp-text" style="margin-top:10px; font-weight:bold">Aguardando...</div>
            </div>
        </section>
    </main>

    <div id="modal-produto" class="modal-overlay">
        <div class="modal-content">
            <h2>Novo Produto</h2>
            <div class="form-group"><label>Nome</label><input type="text" id="prod-nome"></div>
            <div class="form-group"><label>Preço</label><input type="number" id="prod-preco" step="0.01"></div>
            <div class="form-group"><label>Categoria</label><select id="prod-cat"><option>Lanche</option><option>Bebida</option><option>Combo</option></select></div>
            <div class="form-group"><label>Imagem URL</label><input type="text" id="prod-img"></div>
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn btn-primary" style="flex:1" onclick="menu.save()">Salvar</button>
                <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('modal-produto').classList.remove('open')">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-moto" class="modal-overlay">
        <div class="modal-content">
            <h2>Novo Entregador</h2>
            <div class="form-group"><label>Nome</label><input type="text" id="moto-nome"></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="moto-zap"></div>
            <div class="form-group"><label>Veículo</label><input type="text" id="moto-veiculo"></div>
            <button class="btn btn-primary" style="width:100%" onclick="entregadores.salvar()">Salvar</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="document.getElementById('modal-moto').classList.remove('open')">Cancelar</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
        const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        const app = {
            nav: (tabId) => {
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('nav a').forEach(n => n.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                localStorage.setItem('activeTab', tabId);
                
                if(tabId === 'entregadores') setTimeout(() => entregadores.initMap(), 100);
            },
            toggleTheme: () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            }
        };

        const menu = {
            init: async () => {
                const { data } = await db.from('produtos').select('*').order('name');
                if(data) document.getElementById('menu-grid').innerHTML = data.map(i => `
                    <div class="menu-card">
                        <button class="btn-delete" onclick="menu.delete(${i.id})"><i class="fa-solid fa-trash"></i></button>
                        <img src="${i.image_url || 'https://placehold.co/300x200?text=Sem+Foto'}" onerror="this.src='https://placehold.co/300x200?text=Erro'">
                        <div style="font-weight:bold">${i.name}</div>
                        <div style="color:var(--text-sec); font-size:0.8rem">${i.category || 'Geral'}</div>
                        <div style="color:var(--primary); font-weight:bold; margin-top:5px">R$ ${i.price.toFixed(2)}</div>
                    </div>`).join('');
            },
            modal: () => document.getElementById('modal-produto').classList.add('open'),
            save: async () => {
                const name = document.getElementById('prod-nome').value;
                const price = document.getElementById('prod-preco').value;
                const cat = document.getElementById('prod-cat').value;
                const img = document.getElementById('prod-img').value;
                if(name && price) {
                    await db.from('produtos').insert({ name, price: parseFloat(price), category: cat, image_url: img, available: true });
                    document.getElementById('modal-produto').classList.remove('open');
                    menu.init();
                }
            },
            delete: async (id) => {
                if(confirm("Tem certeza que deseja apagar este item?")) {
                    const { error } = await db.from('produtos').delete().eq('id', id);
                    if(error) alert("Erro ao apagar: " + error.message);
                    else menu.init();
                }
            }
        };

        const kds = {
            init: () => {
                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString().slice(0,5), 1000);
                kds.buscar();
                db.channel('kds').on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, () => {
                    kds.buscar(); dashboard.update();
                }).subscribe();
            },
            buscar: async () => {
                const { data } = await db.from('pedidos').select('*').or('status.eq.pendente,status.eq.preparando').order('created_at');
                if(data) document.getElementById('kds-grid').innerHTML = data.length ? data.map(p => `
                    <div class="kds-card ${p.status}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span style="font-weight:900">#${p.id}</span><span>${new Date(p.created_at).toLocaleTimeString().slice(0,5)}</span></div>
                        <div style="font-weight:bold; margin-bottom:10px">${p.cliente_nome}</div>
                        <div style="flex:1; border-top:1px solid #444; padding-top:10px; font-size:0.9rem">
                            ${p.itens ? p.itens.map(i => `<div>${i.qty}x ${i.name}</div>`).join('') : 'Erro'}
                        </div>
                        ${p.status === 'pendente' 
                            ? `<button class="btn-kds btn-action" onclick="kds.setStatus(${p.id}, 'preparando')">PREPARAR</button>` 
                            : `<button class="btn-kds btn-dispatch" onclick="kds.setStatus(${p.id}, 'em_rota')">MOTOBOY</button>`}
                    </div>`).join('') : '<div style="text-align:center; grid-column:1/-1; opacity:0.5">Sem pedidos.</div>';
            },
            setStatus: async (id, s) => { await db.from('pedidos').update({status: s}).eq('id', id); kds.buscar(); }
        };

        const entregadores = {
            list: [], mapa: null,
            init: async () => { entregadores.buscar(); },
            initMap: () => {
                if(entregadores.mapa) return;
                entregadores.mapa = L.map('map-view').setView([-21.7946, -48.1766], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(entregadores.mapa);
            },
            buscar: async () => {
                const { data } = await db.from('entregadores').select('*');
                if(data) document.getElementById('moto-grid').innerHTML = data.map(m => `
                    <div class="moto-card">
                        <b>${m.nome}</b><br><span style="font-size:0.8rem; color:var(--text-sec)">${m.veiculo}</span>
                        <div style="margin-top:10px; font-weight:bold; color:${m.saldo < 0 ? 'red' : 'green'}">Saldo: R$ ${m.saldo.toFixed(2)}</div>
                        <button class="btn-outline" style="width:100%; margin-top:5px; font-size:0.8rem" onclick="entregadores.zerar(${m.id})">ZERAR</button>
                    </div>`).join('');
            },
            modal: () => document.getElementById('modal-moto').classList.add('open'),
            salvar: async () => {
                const nome = document.getElementById('moto-nome').value;
                const zap = document.getElementById('moto-zap').value;
                const veic = document.getElementById('moto-veiculo').value;
                await db.from('entregadores').insert({ nome, zap, veiculo: veic, saldo: 0 });
                document.getElementById('modal-moto').classList.remove('open');
                entregadores.buscar();
            },
            zerar: async (id) => {
                if(confirm("Zerar saldo?")) { await db.from('entregadores').update({saldo: 0}).eq('id', id); entregadores.buscar(); }
            }
        };

        const dashboard = {
            chart: null,
            init: async () => {
                const ctx = document.getElementById('salesChart').getContext('2d');
                dashboard.chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'], datasets: [{ label: 'Vendas', data: [0,0,0,0,0], borderColor: '#EA1D2C', tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                dashboard.update();
            },
            update: async () => {
                const hoje = new Date().toISOString().split('T')[0];
                const { data } = await db.from('pedidos').select('total').gte('created_at', hoje);
                if(data) {
                    document.getElementById('dash-vendas').innerText = `R$ ${data.reduce((a,b)=>a+b.total,0).toFixed(2)}`;
                    document.getElementById('dash-pedidos').innerText = data.length;
                }
            }
        };

        const bot = {
            init: () => {
                db.channel('bot').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'app_config', filter: 'id=eq.1' }, p => {
                    if(p.new.status === 'QR_CODE') document.getElementById('wpp-qr').src = p.new.qr_code;
                    document.getElementById('wpp-text').innerText = p.new.status;
                }).subscribe();
            }
        };

        window.onload = () => {
            dashboard.init(); kds.init(); menu.init(); entregadores.init(); bot.init();
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            const tab = localStorage.getItem('activeTab');
            if(tab) app.nav(tab);
        };
    </script>
</body>
</html>
